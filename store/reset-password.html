<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulap Corner | Reset Password</title>
  <meta name="description" content="Reset your Ulap Corner account password." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script src="/store/age-gate.js"></script>
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(0, 240, 255, 0.16), transparent 20%),
                  radial-gradient(circle at bottom right, rgba(188, 19, 254, 0.12), transparent 25%),
                  linear-gradient(180deg, #06070f 0%, #090b12 100%);
      color: #e3e2e7;
    }
    .portal-card {
      background: rgba(7, 10, 18, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.45);
    }
    .text-error-neon {
      color: #ff4a4a;
      text-shadow: 0 0 10px rgba(255, 74, 74, 0.3);
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex flex-col justify-center px-4 py-12">
    <div class="max-w-md mx-auto w-full">
      
      <div class="portal-card rounded-[32px] p-8">
        <div class="mb-8 flex flex-col gap-3">
          <div>
            <p class="text-sm uppercase tracking-[0.35em] text-slate-400">Security</p>
            <h2 class="text-2xl font-bold text-white">Reset Password</h2>
          </div>
          <p class="text-xs text-white/60">Enter your new secure password below to update your account.</p>
        </div>

        <form id="reset-form" class="space-y-6">
          <div class="space-y-2">
            <label class="block text-[11px] uppercase tracking-[0.35em] text-slate-400">New Password</label>
            <input id="password" type="password" required class="w-full rounded-3xl border border-white/10 bg-[#0f1220] px-4 py-4 text-sm text-white outline-none focus:border-cyan-400/60 focus:ring-0" placeholder="••••••••" />
          </div>
          
          <div class="space-y-2">
            <label class="block text-[11px] uppercase tracking-[0.35em] text-slate-400">Confirm Password</label>
            <input id="confirm-password" type="password" required class="w-full rounded-3xl border border-white/10 bg-[#0f1220] px-4 py-4 text-sm text-white outline-none focus:border-purple-400/60 focus:ring-0" placeholder="••••••••" />
          </div>
          
          <button type="submit" class="w-full rounded-full bg-cyan-400 px-6 py-4 text-sm font-bold uppercase tracking-[0.35em] text-[#00181a] hover:bg-cyan-300 transition shadow-lg shadow-cyan-400/20">Update Password</button>
          
          <p id="message" class="text-sm text-center font-semibold"></p>
        </form>
      </div>

    </div>
  </div>

  <script>
    const resetForm = document.getElementById('reset-form');
    const message = document.getElementById('message');
    
    // Get token from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        message.textContent = 'Invalid request. Missing reset token.';
        message.className = 'text-sm text-error-neon text-center font-semibold';
        resetForm.querySelector('button').disabled = true;
    }

    resetForm.addEventListener('submit', async event => {
        event.preventDefault();
        message.textContent = '';
        
        const newPassword = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            message.textContent = 'Passwords do not match.';
            message.className = 'text-sm text-error-neon text-center font-semibold';
            return;
        }

        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: newPassword })
            });

            const payload = await response.json();

            if (!response.ok) {
                message.textContent = payload.error || 'Failed to reset password.';
                message.className = 'text-sm text-error-neon text-center font-semibold';
                return;
            }

            message.textContent = 'Password reset successful! Redirecting to login...';
            message.className = 'text-sm text-emerald-400 text-center font-semibold';
            
            setTimeout(() => {
                window.location.href = '/store/login.html';
            }, 2500);

        } catch (error) {
            console.error('Reset password error:', error);
            message.textContent = 'An unexpected error occurred.';
            message.className = 'text-sm text-error-neon text-center font-semibold';
        }
    });
  </script>
</body>
</html>
